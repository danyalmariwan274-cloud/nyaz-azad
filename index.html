<!DOCTYPE html>
<html lang="ku">
<head>
     <link rel="stylesheet" href="nyaz.css">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بۆ هاورەکەم ❤️</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background: linear-gradient(135deg,#0f2027,#203a43,#2c5364);
    font-family: Arial, sans-serif;
    overflow:hidden;
}

.card{
    width:360px;
    padding:30px;
    border-radius:25px;
    text-align:center;

    background: rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(15px);
    box-shadow: 0 0 40px rgba(0,0,0,0.5);
    color:white;
}

h1{
    color:#ff4d6d;
    margin-bottom:10px;
}

p{
    font-size:15px;
    line-height:1.6;
    color:#eaeaea;
}

.heart{
    font-size:45px;
    animation: pulse 1.5s infinite;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.3);}
    100%{transform:scale(1);}
}

button{
    margin-top:15px;
    padding:10px 20px;
    border:none;
    border-radius:12px;
    cursor:pointer;
    background: linear-gradient(90deg,#ff4d6d,#4dd0ff);
    color:white;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    transform:scale(1.1);
}
</style>

</head>

<body>

<div class="card">

    <div class="heart">❤️</div>

    <h1>بۆ هاورەکەم</h1>

    <p>
    تۆ باشترین هاورەی ژیانمیت، هەمیشە لە دڵمدا جێگای تایبەتت هەیە ❤️
    </p>

    <p>
    سوپاس بۆ هەموو خۆشەویستی و یارمەتیت، بێ تۆ ژیانم وەک یەک نایە 💫
    </p>

    <p>
    “هاورەی ڕاستەقینە هەمیشە گونی مرۆڤ دەگرێت.”
    </p>
<button> بەس قونەکم بدێ زۆر مەمنونت دەبم باشە گیان</button>
</div>

</body>
</html>
